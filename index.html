<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elo Ranking Tool - Actors Edition</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --card-bg: #fff;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; }

        /* Ranking Section */
        #ranking-section { display: block; }
        
        .matchup-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
        }

        .item-card {
            flex: 1;
            padding: 40px 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            word-break: break-word;
        }

        .item-card:hover {
            border-color: var(--primary-color);
            background: #eef5ff;
            transform: translateY(-2px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }

        /* Leaderboard */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: var(--bg-color); }
        tr:nth-child(even) { background-color: #fafafa; }

        @media (max-width: 600px) {
            .matchup-container { flex-direction: column; }
            .item-card { min-height: 100px; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Elo Ranking Tool</h1>

    <div id="ranking-section">
        <h2>Who is the better actor?</h2>
        
        <div class="matchup-container">
            <div id="item1-card" class="item-card" onclick="castVote(0)">Item 1</div>
            <div id="item2-card" class="item-card" onclick="castVote(1)">Item 2</div>
        </div>

        <div class="controls">
            <button class="btn-secondary" onclick="generateMatchup()">Skip Matchup</button>
            <button class="btn-danger" onclick="resetApp()">Restart Rankings</button>
        </div>

        <h2>Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Elo Rating</th>
                    <th>Matches</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // STATIC LIST OF ACTORS
    // ==========================================
    const myStaticList = [

    ];
    // ==========================================

    let items = [];
    let currentMatch = [];
    const K_FACTOR = 32;

    // DOM Elements
    const item1Card = document.getElementById('item1-card');
    const item2Card = document.getElementById('item2-card');
    const leaderboardBody = document.getElementById('leaderboard-body');

    // Initialize the app immediately on load
    function initApp() {
        items = myStaticList.map((name, index) => ({
            id: index,
            name: name,
            elo: 1200,
            matches: 0
        }));

        generateMatchup();
        updateLeaderboard();
    }

    function generateMatchup() {
        if (items.length < 2) return;

        // Pick two random distinct items
        let idx1 = Math.floor(Math.random() * items.length);
        let idx2;
        do {
            idx2 = Math.floor(Math.random() * items.length);
        } while (idx1 === idx2);

        currentMatch = [items[idx1], items[idx2]];

        item1Card.innerText = currentMatch[0].name;
        item2Card.innerText = currentMatch[1].name;
    }

    function castVote(winnerIndex) {
        const winner = currentMatch[winnerIndex];
        const loser = currentMatch[winnerIndex === 0 ? 1 : 0];

        // Elo Math
        const expectedWinner = 1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));
        const expectedLoser = 1 / (1 + Math.pow(10, (winner.elo - loser.elo) / 400));

        winner.elo = winner.elo + K_FACTOR * (1 - expectedWinner);
        loser.elo = loser.elo + K_FACTOR * (0 - expectedLoser);

        winner.matches++;
        loser.matches++;

        updateLeaderboard();
        generateMatchup();
    }

    function updateLeaderboard() {
        // Sort by Elo descending
        const sortedItems = [...items].sort((a, b) => b.elo - a.elo);
        
        leaderboardBody.innerHTML = '';
        
        sortedItems.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${Math.round(item.elo)}</td>
                <td>${item.matches}</td>
            `;
            leaderboardBody.appendChild(row);
        });
    }

    function resetApp() {
        if(confirm("Are you sure? This will reset all scores back to 1200.")) {
            // Reset scores instead of deleting the list
            items.forEach(item => {
                item.elo = 1200;
                item.matches = 0;
            });
            updateLeaderboard();
            generateMatchup();
        }
    }

    // Start everything when the script runs
    initApp();
</script>

</body>
</html>
