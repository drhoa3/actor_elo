<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Elo Ranking Tool - Actors Edition</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --card-bg: #fff;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; }

        .status-msg {
            text-align: center;
            color: #d9534f;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #ranking-section { display: block; }
        
        .matchup-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
        }

        .item-card {
            flex: 1;
            padding: 40px 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            word-break: break-word;
        }

        .item-card:hover {
            border-color: var(--primary-color);
            background: #eef5ff;
            transform: translateY(-2px);
        }
        
        .item-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: var(--bg-color); }
        tr:nth-child(even) { background-color: #fafafa; }

        @media (max-width: 600px) {
            .matchup-container { flex-direction: column; }
            .item-card { min-height: 100px; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Global Elo Ranking</h1>
    <div id="status-message" class="status-msg">Connecting to database...</div>

    <div id="ranking-section">
        <h2>Who is the better actor?</h2>
        
        <div class="matchup-container">
            <div id="item1-card" class="item-card disabled">Loading...</div>
            <div id="item2-card" class="item-card disabled">Loading...</div>
        </div>

        <div class="controls">
            <button class="btn-secondary" id="skip-btn" disabled>Skip Matchup</button>
        </div>

        <h2>Live Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Elo Rating</th>
                    <th>Matches</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    // Import Firebase tools
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, doc, getDocs, runTransaction, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    // ==========================================
    // ⚠️ PASTE YOUR FIREBASE CONFIG HERE ⚠️
    // ==========================================
   const firebaseConfig = {
      apiKey: "AIzaSyAzLx-R2iZRh_as8v0SUCjZzbr4kBtUiuM",
      authDomain: "actor-elo-app.firebaseapp.com",
      projectId: "actor-elo-app",
      storageBucket: "actor-elo-app.firebasestorage.app",
      messagingSenderId: "345287849419",
      appId: "1:345287849419:web:cfc0d75c3c18c23471324e"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM Elements
    const item1Card = document.getElementById('item1-card');
    const item2Card = document.getElementById('item2-card');
    const leaderboardBody = document.getElementById('leaderboard-body');
    const statusMsg = document.getElementById('status-message');
    const skipBtn = document.getElementById('skip-btn');

    let items = [];
    let currentMatch = [];
    const K_FACTOR = 32;

    const myStaticList = [
        "Leonardo DiCaprio",
        "Adam Driver",
        "Adam Sandler",
        "Amy Adams",
        "Anne Hathaway",
        "Anthony Hopkins",
        "Anya Taylor-Joy",
        "Austin Butler",
        "Ben Stiller",
        "Benedict Cumberbatch",
        "Bill Hader",
        "Brad Pitt",
        "Bradley Cooper",
        "Brie Larson",
        "Cate Blanchett",
        "Charlize Theron",
        "Chris Evans",
        "Chris Hemsworth",
        "Christian Bale",
        "Cillian Murphy",
        "Colin Farrell",
        "Daniel Craig",
        "Daniel Day-Lewis",
        "Denzel Washington",
        "Dwayne \"The Rock\" Johnson",
        "Emily Blunt",
        "Emma Stone",
        "Florence Pugh",
        "George Clooney",
        "Glen Powell",
        "Helen Mirren",
        "Hugh Jackman",
        "Idris Elba",
        "Jack Black",
        "Jake Gyllenhaal",
        "Jason Momoa",
        "Jason Statham",
        "Javier Bardem",
        "Jennifer Lawrence",
        "Jeremy Renner",
        "Jessica Chastain",
        "Julia Roberts",
        "Kate Winslet",
        "Keanu Reeves",
        "Kevin Hart",
        "Lupita Nyong'o",
        "Margot Robbie",
        "Mark Ruffalo",
        "Mark Wahlberg",
        "Matt Damon",
        "Matthew McConaughey",
        "Meryl Streep",
        "Michael B. Jordan",
        "Natalie Portman",
        "Nicolas Cage",
        "Nicole Kidman",
        "Oscar Isaac",
        "Paul Rudd",
        "Pedro Pascal",
        "Penélope Cruz",
        "Regina King",
        "Robert Downey Jr.",
        "Ryan Gosling",
        "Ryan Reynolds",
        "Samuel L. Jackson",
        "Sandra Bullock",
        "Saoirse Ronan",
        "Scarlett Johansson",
        "Steve Carell",
        "Timothée Chalamet",
        "Tom Cruise",
        "Tom Hanks",
        "Tom Hardy",
        "Vin Diesel",
        "Viola Davis",
        "Will Ferrell",
        "Zendaya",
        "Zoe Saldaña"
    ];
    // ==========================================

    async function initializeDatabase() {
        const actorsRef = collection(db, "actors");
        const snapshot = await getDocs(actorsRef);

        // If the database is empty, populate it!
        if (snapshot.empty) {
            statusMsg.innerText = "Setting up global database for the first time... please wait.";
            const batch = writeBatch(db);
            
            myStaticList.forEach(actor => {
                // We use the actor's name as the document ID for easy lookup
                const docRef = doc(db, "actors", actor);
                batch.set(docRef, {
                    name: actor,
                    elo: 1200,
                    matches: 0
                });
            });

            await batch.commit();
        }
        
        statusMsg.innerText = "Connected to live database!";
        setTimeout(() => { statusMsg.style.display = 'none'; }, 2000);
        
        // Start listening to live changes
        listenToLeaderboard();
    }

    function listenToLeaderboard() {
        const actorsRef = collection(db, "actors");
        
        // onSnapshot automatically runs every time ANYONE updates the database
        onSnapshot(actorsRef, (snapshot) => {
            items = [];
            snapshot.forEach((doc) => {
                items.push({ id: doc.id, ...doc.data() });
            });
            
            updateLeaderboard();

            // If a matchup hasn't been generated yet, do it now
            if (currentMatch.length === 0) {
                generateMatchup();
            }
        });
    }

    function generateMatchup() {
        if (items.length < 2) return;

        let idx1 = Math.floor(Math.random() * items.length);
        let idx2;
        do {
            idx2 = Math.floor(Math.random() * items.length);
        } while (idx1 === idx2);

        currentMatch = [items[idx1], items[idx2]];

        item1Card.innerText = currentMatch[0].name;
        item2Card.innerText = currentMatch[1].name;

        // Enable buttons
        item1Card.classList.remove('disabled');
        item2Card.classList.remove('disabled');
        skipBtn.disabled = false;
    }

    // Attach functions to the window object so HTML buttons can click them
    window.generateMatchup = generateMatchup;

    window.castVote = async function(winnerIndex) {
        // Disable buttons temporarily to prevent double-clicking
        item1Card.classList.add('disabled');
        item2Card.classList.add('disabled');
        skipBtn.disabled = true;

        const winnerName = currentMatch[winnerIndex].name;
        const loserName = currentMatch[winnerIndex === 0 ? 1 : 0].name;

        const winnerRef = doc(db, "actors", winnerName);
        const loserRef = doc(db, "actors", loserName);

        try {
            // A Transaction ensures we do the math based on the EXACT live score, 
            // even if someone else voted 1 second ago.
            await runTransaction(db, async (transaction) => {
                const winnerDoc = await transaction.get(winnerRef);
                const loserDoc = await transaction.get(loserRef);

                if (!winnerDoc.exists() || !loserDoc.exists()) {
                    throw "Actor does not exist!";
                }

                let winnerElo = winnerDoc.data().elo;
                let loserElo = loserDoc.data().elo;
                let winnerMatches = winnerDoc.data().matches;
                let loserMatches = loserDoc.data().matches;

                // Elo Math
                const expectedWinner = 1 / (1 + Math.pow(10, (loserElo - winnerElo) / 400));
                const expectedLoser = 1 / (1 + Math.pow(10, (winnerElo - loserElo) / 400));

                const newWinnerElo = winnerElo + K_FACTOR * (1 - expectedWinner);
                const newLoserElo = loserElo + K_FACTOR * (0 - expectedLoser);

                transaction.update(winnerRef, { elo: newWinnerElo, matches: winnerMatches + 1 });
                transaction.update(loserRef, { elo: newLoserElo, matches: loserMatches + 1 });
            });

            // Generate next matchup
            generateMatchup();

        } catch (error) {
            console.error("Transaction failed: ", error);
            statusMsg.style.display = 'block';
            statusMsg.innerText = "Error saving vote. Try again.";
            
            // Re-enable buttons if failed
            item1Card.classList.remove('disabled');
            item2Card.classList.remove('disabled');
            skipBtn.disabled = false;
        }
    };

    // Make Skip button work via Javascript event listener
    skipBtn.addEventListener('click', generateMatchup);
    item1Card.addEventListener('click', () => window.castVote(0));
    item2Card.addEventListener('click', () => window.castVote(1));

    function updateLeaderboard() {
        const sortedItems = [...items].sort((a, b) => b.elo - a.elo);
        leaderboardBody.innerHTML = '';
        
        sortedItems.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${Math.round(item.elo)}</td>
                <td>${item.matches}</td>
            `;
            leaderboardBody.appendChild(row);
        });
    }

    // Start the whole process
    initializeDatabase();
</script>

</body>
</html>
